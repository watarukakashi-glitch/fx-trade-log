<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FX Log" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>FX Trade Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f8faff;
      --border: #dde5f7;
      --primary: #1a56db;
      --primary-light: #e8effe;
      --text: #1e293b;
      --text2: #64748b;
      --text3: #94a3b8;
      --win: #059669;
      --win-bg: #ecfdf5;
      --win-border: #a7f3d0;
      --loss: #dc2626;
      --loss-bg: #fef2f2;
      --loss-border: #fecaca;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ヘッダー */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(26,86,219,0.3);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; letter-spacing: 2px; }

    /* サマリー */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 16px;
    }
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 10px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .summary-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; }
    .summary-value { font-size: 17px; font-weight: 800; color: var(--text); }
    .summary-value.pos { color: var(--win); }
    .summary-value.neg { color: var(--loss); }

    /* フォーム */
    .section { padding: 0 16px 16px; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: var(--surface2);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      background: #fff;
    }

    .direction-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .direction-btn {
      padding: 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text2);
    }
    .direction-btn.sell.active { background: var(--loss-bg); border-color: var(--loss); color: var(--loss); }
    .direction-btn.buy.active { background: var(--win-bg); border-color: var(--win); color: var(--win); }

    /* プレビュー */
    .pnl-preview {
      background: var(--primary-light);
      border: 1.5px solid #b3c6f7;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pnl-preview .val { font-size: 18px; font-weight: 800; }
    .pnl-preview .val.pos { color: var(--win); }
    .pnl-preview .val.neg { color: var(--loss); }

    /* ボタン */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-cancel {
      width: 100%;
      padding: 11px;
      background: var(--surface2);
      color: var(--text2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    /* フィルター */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      overflow-x: auto;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text2);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* トレードカード */
    .trade-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .trade-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      border-left: 4px solid transparent;
    }
    .trade-card.win { border-left-color: var(--win); }
    .trade-card.loss { border-left-color: var(--loss); }

    .trade-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .trade-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .tag.pair { background: #e8effe; color: var(--primary); }
    .tag.sell { background: var(--loss-bg); color: var(--loss); }
    .tag.buy { background: var(--win-bg); color: var(--win); }
    .tag.win { background: var(--win-bg); color: var(--win); }
    .tag.loss { background: var(--loss-bg); color: var(--loss); }
    .trade-date { font-size: 11px; color: var(--text3); }

    .trade-pnl { font-size: 20px; font-weight: 800; }
    .trade-pnl.pos { color: var(--win); }
    .trade-pnl.neg { color: var(--loss); }

    .trade-detail {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .detail-item { font-size: 11px; color: var(--text3); }
    .detail-item span { display: block; font-size: 13px; font-weight: 600; color: var(--text); }

    .trade-note {
      font-size: 12px;
      color: var(--text2);
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 8px;
    }

    .trade-actions { display: flex; gap: 8px; }
    .btn-edit {
      flex: 1;
      padding: 7px;
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-delete {
      flex: 1;
      padding: 7px;
      background: var(--loss-bg);
      color: var(--loss);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* ナビ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
    }
    .nav-btn.active { color: var(--primary); }
    .nav-icon { font-size: 22px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>📊 FX Trade Log</h1>
      <div class="header-sub">TRADE JOURNAL</div>
    </div>
    <div id="total-display" style="text-align:right;">
      <div style="font-size:11px;opacity:0.7;">通算損益</div>
      <div id="header-total" style="font-size:22px;font-weight:800;">¥0</div>
    </div>
  </div>
</div>

<!-- サマリー -->
<div class="summary">
  <div class="summary-card">
    <div class="summary-label">勝率</div>
    <div class="summary-value" id="win-rate">—</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">PF</div>
    <div class="summary-value" id="pf">—</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">トレード数</div>
    <div class="summary-value" id="trade-count">0</div>
  </div>
</div>

<!-- フォーム -->
<div class="section" id="form-section">
  <div class="section-title">
    <span id="form-title">＋ 新規トレード</span>
  </div>
  <div class="card">
    <div class="form-grid">
      <div class="form-group" style="grid-column: 1/-1;">
        <label>日付</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>通貨ペア</label>
        <select id="f-pair">
          <option>USD/JPY</option>
          <option>EUR/JPY</option>
          <option>BTC/JPY</option>
          <option>ETH/JPY</option>
        </select>
      </div>
      <div class="form-group">
        <label>方向</label>
        <div class="direction-toggle">
          <button class="direction-btn sell active" id="btn-sell" onclick="setDir('売り')">売り</button>
          <button class="direction-btn buy" id="btn-buy" onclick="setDir('買い')">買い</button>
        </div>
      </div>
      <div class="form-group">
        <label>エントリーレート</label>
        <input type="number" id="f-entry" placeholder="162.250" step="0.001" oninput="updatePreview()" />
      </div>
      <div class="form-group">
        <label>決済レート</label>
        <input type="number" id="f-exit" placeholder="159.000" step="0.001" oninput="updatePreview()" />
      </div>
      <div class="form-group" style="grid-column: 1/-1;">
        <label>ロット（通貨単位）</label>
        <input type="number" id="f-lot" placeholder="35000" oninput="updatePreview()" />
      </div>
      <div class="form-group" style="grid-column: 1/-1;">
        <label>エントリー根拠</label>
        <input type="text" id="f-reason" placeholder="介入待ち、ブレイクアウト..." />
      </div>
      <div class="form-group" style="grid-column: 1/-1;">
        <label>メモ・反省点</label>
        <input type="text" id="f-memo" placeholder="感情的だった、損切りが遅れた..." />
      </div>
    </div>

    <div class="pnl-preview" id="pnl-preview" style="display:none;">
      <span>予想損益</span>
      <span class="val" id="preview-val"></span>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="submitTrade()">記録する</button>
    <button class="btn-cancel" id="cancel-btn" style="display:none;" onclick="cancelEdit()">キャンセル</button>
  </div>
</div>

<!-- フィルター -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">全て</button>
  <button class="filter-btn" onclick="setFilter('win', this)">勝ち ✅</button>
  <button class="filter-btn" onclick="setFilter('loss', this)">負け ❌</button>
</div>

<!-- リスト -->
<div class="trade-list" id="trade-list"></div>

<div style="height:70px;"></div>

<script>
  let trades = JSON.parse(localStorage.getItem('fx-trades') || '[]');
  let direction = '売り';
  let editId = null;
  let currentFilter = 'all';

  // 今日の日付をデフォルト設定
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  function save() {
    localStorage.setItem('fx-trades', JSON.stringify(trades));
    render();
    updateSummary();
  }

  function setDir(d) {
    direction = d;
    document.getElementById('btn-sell').className = 'direction-btn sell' + (d === '売り' ? ' active' : '');
    document.getElementById('btn-buy').className = 'direction-btn buy' + (d === '買い' ? ' active' : '');
    updatePreview();
  }

  function calcPnL(dir, entry, exit, lot) {
    const e = parseFloat(entry), x = parseFloat(exit), l = parseFloat(lot);
    if (isNaN(e) || isNaN(x) || isNaN(l)) return null;
    const diff = dir === '売り' ? e - x : x - e;
    return Math.round(diff * l * 10) / 10;
  }

  function fmt(n) {
    if (n === null || n === undefined) return '—';
    return (n >= 0 ? '+' : '') + Math.round(n).toLocaleString() + '円';
  }

  function updatePreview() {
    const pnl = calcPnL(
      direction,
      document.getElementById('f-entry').value,
      document.getElementById('f-exit').value,
      document.getElementById('f-lot').value
    );
    const el = document.getElementById('pnl-preview');
    const val = document.getElementById('preview-val');
    if (pnl !== null) {
      el.style.display = 'flex';
      val.textContent = fmt(pnl);
      val.className = 'val ' + (pnl >= 0 ? 'pos' : 'neg');
    } else {
      el.style.display = 'none';
    }
  }

  function submitTrade() {
    const date = document.getElementById('f-date').value;
    const entry = document.getElementById('f-entry').value;
    const exit = document.getElementById('f-exit').value;
    const lot = document.getElementById('f-lot').value;
    if (!date || !entry || !exit || !lot) {
      alert('日付・レート・ロットは必須です');
      return;
    }
    const pnl = calcPnL(direction, entry, exit, lot);
    const record = {
      id: editId || Date.now(),
      date,
      pair: document.getElementById('f-pair').value,
      direction,
      entryRate: entry,
      exitRate: exit,
      lot,
      reason: document.getElementById('f-reason').value,
      memo: document.getElementById('f-memo').value,
      pnl
    };
    if (editId) {
      trades = trades.map(t => t.id === editId ? record : t);
    } else {
      trades.push(record);
    }
    resetForm();
    save();
  }

  function resetForm() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-entry').value = '';
    document.getElementById('f-exit').value = '';
    document.getElementById('f-lot').value = '';
    document.getElementById('f-reason').value = '';
    document.getElementById('f-memo').value = '';
    document.getElementById('pnl-preview').style.display = 'none';
    setDir('売り');
    editId = null;
    document.getElementById('submit-btn').textContent = '記録する';
    document.getElementById('cancel-btn').style.display = 'none';
    document.getElementById('form-title').textContent = '＋ 新規トレード';
  }

  function cancelEdit() { resetForm(); }

  function editTrade(id) {
    const t = trades.find(x => x.id === id);
    if (!t) return;
    editId = id;
    document.getElementById('f-date').value = t.date;
    document.getElementById('f-pair').value = t.pair;
    setDir(t.direction);
    document.getElementById('f-entry').value = t.entryRate;
    document.getElementById('f-exit').value = t.exitRate;
    document.getElementById('f-lot').value = t.lot;
    document.getElementById('f-reason').value = t.reason || '';
    document.getElementById('f-memo').value = t.memo || '';
    document.getElementById('submit-btn').textContent = '更新する';
    document.getElementById('cancel-btn').style.display = 'block';
    document.getElementById('form-title').textContent = '✏️ 編集中';
    updatePreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteTrade(id) {
    if (!confirm('このトレードを削除しますか？')) return;
    trades = trades.filter(t => t.id !== id);
    save();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const filtered = trades.filter(t =>
      currentFilter === 'all' ? true :
      currentFilter === 'win' ? t.pnl >= 0 : t.pnl < 0
    ).slice().reverse();

    const list = document.getElementById('trade-list');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">トレードを記録してください</div></div>`;
      return;
    }
    list.innerHTML = filtered.map(t => `
      <div class="trade-card ${t.pnl >= 0 ? 'win' : 'loss'}">
        <div class="trade-top">
          <div class="trade-meta">
            <span class="trade-date">${t.date}</span>
            <span class="tag pair">${t.pair}</span>
            <span class="tag ${t.direction === '売り' ? 'sell' : 'buy'}">${t.direction}</span>
            <span class="tag ${t.pnl >= 0 ? 'win' : 'loss'}">${t.pnl >= 0 ? 'WIN' : 'LOSS'}</span>
          </div>
          <div class="trade-pnl ${t.pnl >= 0 ? 'pos' : 'neg'}">${fmt(t.pnl)}</div>
        </div>
        <div class="trade-detail">
          <div class="detail-item">エントリー<span>${t.entryRate}</span></div>
          <div class="detail-item">決済<span>${t.exitRate}</span></div>
          <div class="detail-item">ロット<span>${Number(t.lot).toLocaleString()}</span></div>
        </div>
        ${t.reason || t.memo ? `<div class="trade-note">${t.reason ? '📌 ' + t.reason : ''}${t.reason && t.memo ? ' / ' : ''}${t.memo ? '📝 ' + t.memo : ''}</div>` : ''}
        <div class="trade-actions">
          <button class="btn-edit" onclick="editTrade(${t.id})">編集</button>
          <button class="btn-delete" onclick="deleteTrade(${t.id})">削除</button>
        </div>
      </div>
    `).join('');
  }

  function updateSummary() {
    const total = trades.reduce((s, t) => s + (t.pnl || 0), 0);
    const wins = trades.filter(t => t.pnl >= 0).length;
    const losses = trades.filter(t => t.pnl < 0).length;
    const winRate = trades.length ? Math.round(wins / trades.length * 100) : null;
    const avgWin = wins > 0 ? trades.filter(t => t.pnl > 0).reduce((s, t) => s + t.pnl, 0) / wins : 0;
    const avgLoss = losses > 0 ? Math.abs(trades.filter(t => t.pnl < 0).reduce((s, t) => s + t.pnl, 0) / losses) : 0;
    const pf = avgLoss > 0 ? (avgWin * wins / (avgLoss * losses)).toFixed(2) : '∞';

    const hTotal = document.getElementById('header-total');
    hTotal.textContent = fmt(total);
    hTotal.style.color = total >= 0 ? '#7dd3fc' : '#fca5a5';

    document.getElementById('win-rate').textContent = winRate !== null ? winRate + '%' : '—';
    document.getElementById('win-rate').className = 'summary-value' + (winRate >= 50 ? ' pos' : winRate !== null ? ' neg' : '');
    document.getElementById('pf').textContent = pf;
    document.getElementById('trade-count').textContent = trades.length + '回';
  }

  // 初期化
  render();
  updateSummary();

  // PWA Service Worker登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
